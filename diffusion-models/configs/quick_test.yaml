# Quick test configuration for faster training

# Model Architecture (smaller for speed)
model:
  image_size: 32
  in_channels: 3
  model_channels: 64  # Reduced from 128
  out_channels: 3
  num_res_blocks: 1  # Reduced from 2
  attention_resolutions: [16]  # Reduced from [16, 8]
  channel_mult: [1, 2, 2]  # Reduced from [1, 2, 2, 2]
  num_heads: 4
  dropout: 0.1
  use_scale_shift_norm: true

# Diffusion Process
diffusion:
  timesteps: 1000
  beta_schedule: "cosine"
  beta_start: 0.0001
  beta_end: 0.02
  
# Training (reduced epochs for testing)
training:
  batch_size: 128
  num_epochs: 50  # Reduced from 500
  learning_rate: 0.0002
  weight_decay: 0.0
  ema_decay: 0.9999
  gradient_clip: 1.0
  num_workers: 4
  save_interval: 10  # Save more frequently
  sample_interval: 5  # Sample more frequently
  
# Conditioning
conditioning:
  enabled: true
  num_classes: 10
  dropout_prob: 0.1
  
# Dataset
dataset:
  name: "cifar10"
  data_dir: "./data/cifar10"
  
# Logging
logging:
  log_dir: "./experiments/quick_test"
  use_tensorboard: true
  
# Reproducibility
seed: 42
