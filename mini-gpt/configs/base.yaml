# Base GPT configuration (~117M parameters)

model:
  vocab_size: 50257
  max_seq_len: 1024
  d_model: 768
  num_layers: 12
  num_heads: 12
  d_ff: 3072
  dropout: 0.1
  bias: true
  use_sinusoidal_pos: false

data:
  num_train: 5000
  num_val: 500

training:
  num_epochs: 5
  batch_size: 4
  grad_accum_steps: 8
  learning_rate: 2.5e-4
  weight_decay: 0.1
  warmup_ratio: 0.05
  min_lr_ratio: 0.1
  max_grad_norm: 1.0
  use_amp: true
  log_interval: 100
  eval_interval: 500
  save_interval: 1000
  checkpoint_dir: checkpoints
