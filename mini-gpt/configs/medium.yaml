# Medium GPT configuration (~350M parameters)

model:
  vocab_size: 50257
  max_seq_len: 1024
  d_model: 1024
  num_layers: 24
  num_heads: 16
  d_ff: 4096
  dropout: 0.1
  bias: true
  use_sinusoidal_pos: false

data:
  num_train: 10000
  num_val: 1000

training:
  num_epochs: 10
  batch_size: 2
  grad_accum_steps: 16
  learning_rate: 2.0e-4
  weight_decay: 0.1
  warmup_ratio: 0.05
  min_lr_ratio: 0.1
  max_grad_norm: 1.0
  use_amp: true
  log_interval: 100
  eval_interval: 500
  save_interval: 2000
  checkpoint_dir: checkpoints
