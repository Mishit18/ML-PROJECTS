# Large GPT configuration for 8GB GPU
# 117M parameters - Extended training (10 epochs)

model:
  vocab_size: 50257
  max_seq_len: 1024
  d_model: 768
  num_layers: 12
  num_heads: 12
  d_ff: 3072
  dropout: 0.1
  bias: true
  use_sinusoidal_pos: false

data:
  num_train: 50000
  num_val: 5000

training:
  num_epochs: 10
  batch_size: 2
  grad_accum_steps: 16
  learning_rate: 2.5e-4
  weight_decay: 0.1
  warmup_ratio: 0.05
  min_lr_ratio: 0.1
  max_grad_norm: 1.0
  use_amp: true
  log_interval: 50
  eval_interval: 500
  save_interval: 1000
  checkpoint_dir: checkpoints
