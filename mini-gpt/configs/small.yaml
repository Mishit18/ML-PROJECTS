# Small GPT configuration (~25M parameters)

model:
  vocab_size: 50257
  max_seq_len: 512
  d_model: 384
  num_layers: 6
  num_heads: 6
  d_ff: 1536
  dropout: 0.1
  bias: true
  use_sinusoidal_pos: false

data:
  num_train: 1000
  num_val: 100

training:
  num_epochs: 3
  batch_size: 8
  grad_accum_steps: 4
  learning_rate: 3.0e-4
  weight_decay: 0.1
  warmup_ratio: 0.1
  min_lr_ratio: 0.1
  max_grad_norm: 1.0
  use_amp: true
  log_interval: 100
  eval_interval: 500
  save_interval: 1000
  checkpoint_dir: checkpoints
