seed: 42
data_dir: ./data
out_dir: ./runs/cifar10_rtx4060_best

image_size: 32
channels: 3
batch_size: 64
num_workers: 4

model:
  base_channels: 128
  channel_mults: [1, 2, 2, 4]
  num_res_blocks: 2
  attention_resolutions: [16, 8]
  num_heads: 4
  dropout: 0.1
  time_emb_mult: 4

diffusion:
  timesteps: 1000
  schedule: cosine
  beta_start: 0.0001
  beta_end: 0.02

train:
  epochs: 300
  max_steps: 300000
  lr: 0.0002
  min_lr_ratio: 0.05
  warmup_steps: 2000
  weight_decay: 0.01
  grad_clip: 1.0
  grad_accum_steps: 2
  ema_decay: 0.9999
  amp: true
  tf32: true
  channels_last: false
  log_every: 100
  sample_every: 5
  save_every: 5
  sample_count: 64
